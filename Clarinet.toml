[project]
name = "Decentralized-Business-Intelligence-Reporting-Networks"
description = "A decentralized platform for secure and verifiable business intelligence reporting."
authors = ["Your Name <you@example.com>"]  # Replace or add additional contributors
telemetry = true
cache_dir = "./.cache"

# Uncomment and define smart contracts here
# [contracts.counter]
# path = "contracts/counter.clar"

[repl.analysis]
passes = ["check_checker"]

# Configuration for the check_checker safety analysis tool
[repl.analysis.check_checker]
trusted_sender = false     # Set to true if tx_sender is explicitly checked before use
trusted_caller = false     # Set to true if contract-caller is explicitly checked before use
callee_filter = false      # Set to true to allow private function filtering based on internal checks

# Additional Notes:
# - trusted_sender: Trust inputs after verifying tx_sender.
# - trusted_caller: Trust inputs after verifying contract-caller.
# - callee_filter: Allow untrusted inputs into private functions if checked internally.
# For more details, see: https://www.hiro.so/blog/new-safety-checks-in-clarinet
